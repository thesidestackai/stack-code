name: Rust CI

on:
  push:
    branches:
      - main
      - 'gaebal/**'
      - 'omx-issue-*'
    paths:
      - .github/workflows/rust-ci.yml
      - .github/scripts/check_doc_source_of_truth.py
      - .github/FUNDING.yml
      - README.md
      - USAGE.md
      - PARITY.md
      - PHILOSOPHY.md
      - ROADMAP.md
      - docs/**
      - rust/**
      - schemas/**
      - scripts/a2-tier3-write-orchestrator.sh
      - scripts/claw-sidestack-local
      - scripts/validate_planner_output_schema.py
      - tests/a2_l4/**
      - tests/shell/**
      - examples/sidestack-local.env
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/rust-ci.yml
      - .github/scripts/check_doc_source_of_truth.py
      - .github/FUNDING.yml
      - README.md
      - USAGE.md
      - PARITY.md
      - PHILOSOPHY.md
      - ROADMAP.md
      - docs/**
      - rust/**
      - schemas/**
      - scripts/a2-tier3-write-orchestrator.sh
      - scripts/claw-sidestack-local
      - scripts/validate_planner_output_schema.py
      - tests/a2_l4/**
      - tests/shell/**
      - examples/sidestack-local.env
  workflow_dispatch:

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: rust

env:
  CARGO_TERM_COLOR: always

jobs:
  doc-source-of-truth:
    name: docs source-of-truth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check docs and metadata for stale branding
        run: python .github/scripts/check_doc_source_of_truth.py

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Check formatting
        run: cargo fmt --all --check

  test-workspace:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run workspace tests
        run: cargo test --workspace

  clippy-workspace:
    name: cargo clippy --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run workspace clippy
        run: cargo clippy --workspace

  shell-tests:
    name: shell tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax
        run: |
          bash -n scripts/claw-sidestack-local
          bash -n tests/shell/test_claw_sidestack_local.sh
          bash -n scripts/a2-tier3-write-orchestrator.sh
          bash -n tests/shell/test_a2_tier3_write_orchestrator.sh
      - name: Shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/claw-sidestack-local
          shellcheck tests/shell/test_claw_sidestack_local.sh
          shellcheck scripts/a2-tier3-write-orchestrator.sh
          shellcheck tests/shell/test_a2_tier3_write_orchestrator.sh
      - name: Run shell tests
        run: |
          bash tests/shell/test_claw_sidestack_local.sh
          bash tests/shell/test_a2_tier3_write_orchestrator.sh

  planner-output-validator:
    name: planner-output validator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validator unit tests
        run: python -m unittest discover -s tests/a2_l4 -p 'test_*.py'
      - name: Validator fixture self-test
        run: python scripts/validate_planner_output_schema.py --self-test
